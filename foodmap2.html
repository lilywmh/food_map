<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美食地理手账 · Food Scrapbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cream: #FDFBF7;
      --parchment: #F3EFE9;
      --ink: #5D574F;
      --ink-light: #A79E8F;
      --accent: #E8DCC4;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Klee One', 'Ma Shan Zheng', cursive;
      background-color: #E5DACE;
      background-image: radial-gradient(#d1c7b3 0.8px, transparent 0.8px);
      background-size: 24px 24px;
      color: var(--ink);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 3D 书本容器 */
    .book-wrapper {
      perspective: 1500px;
      width: 95%;
      max-width: 1200px;
      height: 85vh;
    }

    .book {
      width: 100%;
      height: 100%;
      background: var(--cream);
      display: flex;
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
      border-radius: 4px;
      position: relative;
      animation: bookOpen 1.2s ease-out forwards;
      border: 1px solid var(--accent);
    }

    @keyframes bookOpen {
      0% { transform: rotateY(-15deg) scale(0.95); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    /* 页面划分 */
    .page-left {
      flex: 1.4;
      border-right: 2px solid rgba(0,0,0,0.03);
      position: relative;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .page-right {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
      background: var(--cream);
      z-index: 5;
    }

    /* 中缝阴影 */
    .spine {
      position: absolute;
      left: 58.333%; /* 对应 flex 比例 */
      width: 40px;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.05), transparent 50%, rgba(0,0,0,0.05));
      z-index: 10;
      pointer-events: none;
      transform: translateX(-50%);
    }

    /* 地图容器 */
    #map {
      flex: 1;
      border-radius: 16px;
      background: var(--parchment);
      border: 6px solid white;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    }

    /* 旅行小人 */
    #traveler {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      display: none;
    }

    .traveler-anim {
      animation: bounce 0.6s infinite alternate ease-in-out;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }
    .walking { animation: walking 0.2s infinite alternate ease-in-out; }
    @keyframes walking {
      from { transform: rotate(-5deg); }
      to { transform: rotate(5deg); }
    }

    /* 自定义 Marker */
    .custom-marker {
      background: none; border: none;
    }
    .marker-stamp {
      width: 32px; height: 32px;
      background: white;
      border-radius: 8px;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 var(--accent);
      font-size: 18px;
      transition: all 0.2s;
    }
    .marker-stamp:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--accent); }

    /* 便签风格 Popup */
    .leaflet-popup-content-wrapper {
      background: #fff;
      border-radius: 2px;
      box-shadow: 5px 5px 0 rgba(232, 220, 196, 0.5);
      border: 1px solid #eee;
    }
    .pop-card { padding: 10px; }
    .pop-title { font-weight: bold; font-size: 16px; color: var(--ink); margin-bottom: 4px; }
    .pop-note { font-size: 12px; color: var(--ink-light); font-style: italic; border-top: 1px dashed var(--accent); mt-2 pt-2; }

    /* 过滤器 - 游戏背包风格 */
    .filter-pills {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .pill {
      padding: 6px 12px; border-radius: 12px; font-size: 12px;
      cursor: pointer; background: white; border: 2px solid var(--accent);
      transition: all 0.2s;
    }
    .pill.active { background: var(--accent); color: white; transform: scale(1.05); }

    /* 详情展示区 */
    #detail-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
    }
    .tape {
      width: 80px; height: 25px; background: rgba(232, 220, 196, 0.4);
      margin: -15px auto 10px auto; transform: rotate(-2deg);
    }
  </style>
</head>
<body>

  <div class="book-wrapper">
    <div class="book">
      <!-- 左页：地图展示 -->
      <div class="page-left">
        <div class="flex items-end gap-3 mb-4">
          <h1 style="font-family: 'Ma Shan Zheng'; font-size: 32px;">美食地理足迹</h1>
          <div id="countBadge" class="bg-white px-2 py-0.5 rounded-full border border-stone-200 text-[10px] font-bold text-stone-400 mb-2 uppercase">0 SHOPS</div>
        </div>
        
        <div id="map"></div>

        <!-- 小人节点 -->
        <div id="traveler">
            <div class="flex flex-col items-center traveler-anim">
                <div class="bg-white/90 px-2 py-1 rounded-full text-[9px] font-bold shadow-sm mb-1 border border-stone-100">出发！</div>
                <svg width="30" height="38" viewBox="0 0 32 40">
                    <circle cx="16" cy="10" r="8" fill="#5D574F" />
                    <path d="M8 20C8 17 12 16 16 16C20 16 24 17 24 20V32H8V20Z" fill="#A79E8F" />
                    <rect x="10" y="32" width="4" height="6" rx="2" fill="#5D574F" />
                    <rect x="18" y="32" width="4" height="6" rx="2" fill="#5D574F" />
                </svg>
            </div>
        </div>
      </div>

      <div class="spine"></div>

      <!-- 右页：过滤与详情 -->
      <div class="page-right">
        <div class="mb-8">
          <p class="text-[10px] font-bold text-stone-400 tracking-widest mb-3 uppercase">🔍 过滤搜寻</p>
          <div class="filter-pills" id="tierFilter">
            <div class="pill active" data-tier="1">⭐ 精选</div>
            <div class="pill active" data-tier="2">· 去过</div>
          </div>
        </div>

        <div id="detail-area">
          <div id="empty-hint" class="text-center opacity-30">
             <div class="text-4xl mb-4">📖</div>
             <p class="text-sm">点击地图上的印章<br>查看我的品尝笔记</p>
          </div>
          
          <div id="food-card" class="hidden">
            <div class="tape"></div>
            <div class="bg-white p-6 rounded-sm border border-stone-100 shadow-sm">
                <div id="detail-tag" class="text-[10px] text-accent font-bold uppercase mb-1"></div>
                <h2 id="detail-name" class="text-2xl font-bold mb-2"></h2>
                <div id="detail-rating" class="text-yellow-400 text-xs mb-4"></div>
                <div class="space-y-4">
                    <div class="bg-stone-50 p-3 rounded">
                        <span class="text-[9px] block text-stone-400 font-bold">推荐必点</span>
                        <p id="detail-dish" class="text-sm font-bold"></p>
                    </div>
                    <p id="detail-note" class="text-sm italic leading-relaxed text-stone-500"></p>
                </div>
            </div>
          </div>
        </div>

        <div class="mt-auto pt-6 border-t border-stone-100">
           <p class="text-[10px] font-bold text-stone-300 tracking-widest mb-3 uppercase">MY COLLECTION</p>
           <div class="flex gap-2 overflow-x-auto pb-2" id="stampShelf">
              <!-- 这里可以放置小图标 -->
           </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 使用你上传文件中的原始数据结构（这里保留基础样例，你可以根据需要替换回完整版）
    const foodData = [
      { id: 1, name: "老城南生煎", tier: 1, lat: 32.02, lng: 118.78, city: "南京", rating: 5, dish: "蟹黄生煎", note: "金黄酥脆，汁水饱满。", budget: 1, icon: "🥟" },
      { id: 2, name: "雾都火锅", tier: 1, lat: 30.57, lng: 104.06, city: "成都", rating: 5, dish: "麻辣牛肉", note: "够麻够辣，巴适得板！", budget: 2, icon: "🥘" },
      { id: 3, name: "静谧咖啡", tier: 2, lat: 31.23, lng: 121.47, city: "上海", rating: 4, dish: "手冲瑰夏", note: "弄堂里的午后很安静。", budget: 2, icon: "☕" }
    ];

    const activeTiers = new Set([1, 2]);
    let activeCoords = null;

    // 初始化地图
    const map = L.map('map', { zoomControl: false }).setView([35, 110], 4);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© CartoDB'
    }).addTo(map);

    const layer = L.layerGroup().addTo(map);
    const traveler = document.getElementById('traveler');

    function render() {
      layer.clearLayers();
      const visible = foodData.filter(d => activeTiers.has(d.tier));
      
      visible.forEach(item => {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div class="marker-stamp">${item.icon || '📍'}</div>`,
          iconSize: [32, 32]
        });

        const marker = L.marker([item.lat, item.lng], { icon }).addTo(layer);
        marker.on('click', () => {
          showDetail(item);
        });
      });
      document.getElementById('countBadge').textContent = visible.length + ' 家';
    }

    function showDetail(item) {
      document.getElementById('empty-hint').classList.add('hidden');
      const card = document.getElementById('food-card');
      card.classList.remove('hidden');
      
      document.getElementById('detail-name').textContent = item.name;
      document.getElementById('detail-tag').textContent = `${item.city} · ${item.tier === 1 ? '精选推荐' : '路过足迹'}`;
      document.getElementById('detail-dish').textContent = item.dish || '暂无推荐菜';
      document.getElementById('detail-note').textContent = item.note || '写点什么吧...';
      document.getElementById('detail-rating').textContent = '★'.repeat(item.rating);

      // 小人移动
      activeCoords = [item.lat, item.lng];
      updateTraveler();
      map.flyTo(activeCoords, 10, { duration: 1.5 });
    }

    function updateTraveler() {
      if (!activeCoords) return;
      const point = map.latLngToContainerPoint(activeCoords);
      const travelerBody = traveler.querySelector('.traveler-anim');
      
      traveler.style.display = 'block';
      traveler.style.left = point.x + 'px';
      traveler.style.top = point.y + 'px';
      
      travelerBody.classList.add('walking');
      setTimeout(() => travelerBody.classList.remove('walking'), 1000);
    }

    // 地图交互同步小人位置
    map.on('move', updateTraveler);

    // 过滤器点击事件
    document.getElementById('tierFilter').addEventListener('click', e => {
      const p = e.target.closest('.pill'); if(!p) return;
      const t = parseInt(p.dataset.tier);
      if(activeTiers.has(t)) {
        if(activeTiers.size === 1) return;
        activeTiers.delete(t); p.classList.remove('active');
      } else {
        activeTiers.add(t); p.classList.add('active');
      }
      render();
    });

    render();
  </script>
</body>
</html>
